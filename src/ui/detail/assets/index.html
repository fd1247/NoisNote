<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' qrc:; script-src 'self' qrc:; style-src 'self'; img-src 'self' data:; connect-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
    <title>NoisNote Detail Viewer</title>
    <link rel="stylesheet" href="./detail-viewer.css">
    <link rel="stylesheet" href="./vendor/markdownit.css">
  </head>
  <body>
    <main class="detail-shell">
      <section id="emptyState" class="state-panel">选择一条历史记录后查看内容。</section>
      <section id="errorState" class="state-panel error" hidden></section>
      <section id="contentPanel" class="content-panel" hidden>
        <div id="body-container">
          <div id="vx-content"></div>
        </div>
        <ol id="timelinePanel" class="timeline-list" hidden></ol>
        <textarea id="editorPanel" class="markdown-editor" hidden spellcheck="false"></textarea>
      </section>
    </main>
    <script src="qrc:///qtwebchannel/qwebchannel.js"></script>
    <script src="./vendor/markdown-it.min.js"></script>
    <script src="./vendor/markdown-it-container.min.js"></script>
    <script src="./vendor/markdown-it-task-lists.js"></script>
    <script src="./vendor/markdown-it-sub.min.js"></script>
    <script src="./vendor/markdown-it-sup.min.js"></script>
    <script src="./vendor/markdown-it-emoji.min.js"></script>
    <script src="./vendor/markdown-it-footnote.min.js"></script>
    <script src="./vendor/markdown-it-front-matter.js"></script>
    <script src="./vendor/markdown-it-imsize.min.js"></script>
    <script src="./vendor/markdown-it-inject-linenumbers.js"></script>
    <script src="./vendor/markdownItAnchor.umd.js"></script>
    <script src="./vendor/markdownItTocDoneRight.umd.js"></script>
    <script src="./vendor/markdown-it-implicit-figure.js"></script>
    <script src="./vendor/markdown-it-mark.min.js"></script>
    <script src="./detail-viewer.js"></script>
  </body>
</html>
